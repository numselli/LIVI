name: gstreamer assets
run-name: 'gstreamer-assets → ${{ github.ref_name }}'

on:
  workflow_dispatch:
    inputs:
      darwin:
        description: 'Build Darwin bundle'
        type: boolean
        default: false
      linux_x86_64:
        description: 'Build Linux x86_64 bundle'
        type: boolean
        default: false
      linux_aarch64:
        description: 'Build Linux aarch64 bundle'
        type: boolean
        default: false
      win_x86_64:
        description: 'Build Windows x86-64 bundle'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  plan:
    name: Plan asset matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      is_empty: ${{ steps.plan.outputs.is_empty }}

    steps:
      - id: plan
        shell: bash
        env:
          IN_DARWIN: ${{ inputs.darwin }}
          IN_LINUX_X86_64: ${{ inputs.linux_x86_64 }}
          IN_LINUX_AARCH64: ${{ inputs.linux_aarch64 }}
          IN_WIN_X86_64: ${{ inputs.win_x86_64 }}
        run: |
          set -euo pipefail

          node <<'NODE'
          const fs = require('fs');

          const isTrue = (v) => String(v).toLowerCase() === 'true';

          const inputs = {
            darwin: isTrue(process.env.IN_DARWIN),
            linux_x86_64: isTrue(process.env.IN_LINUX_X86_64),
            linux_aarch64: isTrue(process.env.IN_LINUX_AARCH64),
            win_x86_64: isTrue(process.env.IN_WIN_X86_64),
          };

          const include = [];
          const add = (platform, os, asset_path, artifact_name) => {
            include.push({ platform, os, asset_path, artifact_name });
          };

          if (inputs.darwin) add('darwin', 'macos-latest', 'assets/gstreamer/darwin-arm64', 'gstreamer-darwin-arm64');
          if (inputs.linux_x86_64) add('linux-x86_64', 'ubuntu-24.04', 'assets/gstreamer/linux-x86_64', 'gstreamer-linux-x86_64');
          if (inputs.linux_aarch64) add('linux-aarch64', 'ubuntu-24.04-arm', 'assets/gstreamer/linux-aarch64', 'gstreamer-linux-aarch64');
          if (inputs.win_x86_64) add('win-x86_64', 'windows-latest', 'assets/gstreamer/win-x86_64', 'gstreamer-win-x86_64');

          const matrixObj = { include };
          const matrix = JSON.stringify(matrixObj);
          const isEmpty = include.length === 0 ? 'true' : 'false';

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `matrix=${matrix}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `is_empty=${isEmpty}\n`);

          console.log('Planned matrix:', matrix);
          console.log('Empty:', isEmpty);
          NODE

  build:
    name: Build assets (${{ matrix.platform }})
    needs: plan
    if: ${{ needs.plan.outputs.is_empty != 'true' }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v6

      - name: Download GStreamer runtime pkg [darwin]
        if: matrix.platform == 'darwin'
        shell: bash
        run: |
          set -euo pipefail
          curl -fL \
            -o gstreamer-runtime.pkg \
            https://gstreamer.freedesktop.org/data/pkg/osx/1.28.1/gstreamer-1.0-1.28.1-universal.pkg

      - name: Install GStreamer runtime pkg [darwin]
        if: matrix.platform == 'darwin'
        shell: bash
        run: |
          set -euo pipefail
          sudo installer -pkg gstreamer-runtime.pkg -target /

      - name: Build bundle [darwin]
        if: matrix.platform == 'darwin'
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/gstreamer/package-darwin.sh
          scripts/gstreamer/package-darwin.sh "${{ matrix.asset_path }}"

      - name: Smoke test bundle [darwin]
        if: matrix.platform == 'darwin'
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/gstreamer/smoke-test-darwin.sh
          scripts/gstreamer/smoke-test-darwin.sh "${{ matrix.asset_path }}"

      - name: Write version file [darwin]
        if: matrix.platform == 'darwin'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$("${{ matrix.asset_path }}/bin/gst-launch-1.0" --version | awk '/^gst-launch-1.0 version / { print $3; exit }')"
          printf '%s\n' "$VERSION" > "${{ matrix.asset_path }}/version.txt"
          echo "Version: $VERSION"

      - name: Pack artifact [darwin]
        if: matrix.platform == 'darwin'
        shell: bash
        run: |
          set -euo pipefail
          tar -C assets/gstreamer -czf gstreamer-darwin-arm64.tar.gz darwin-arm64

      - name: Upload artifact [darwin]
        if: matrix.platform == 'darwin'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: gstreamer-darwin-arm64.tar.gz
          retention-days: 7

      - name: Build bundle [linux-x86_64 via Debian forky]
        if: matrix.platform == 'linux-x86_64'
        shell: bash
        run: |
          set -euo pipefail

          chmod +x scripts/gstreamer/package-linux.sh
          chmod +x scripts/gstreamer/smoke-test-linux.sh

          docker run --rm --platform=linux/amd64 \
            -v "${GITHUB_WORKSPACE}:/work" \
            -w /work \
            debian:forky-slim sh -lc '
              set -euo pipefail

              export DEBIAN_FRONTEND=noninteractive

              apt-get update
              apt-get install -y --no-install-recommends \
                bash coreutils findutils file python3 dpkg-dev ca-certificates \
                gstreamer1.0-tools \
                gstreamer1.0-plugins-base \
                gstreamer1.0-plugins-good \
                gstreamer1.0-plugins-bad \
                gstreamer1.0-libav \
                gstreamer1.0-gl \
                gstreamer1.0-x \
                gstreamer1.0-alsa \
                gstreamer1.0-pulseaudio \
                libgstreamer1.0-0 \
                libgstreamer-plugins-base1.0-0 \
                libglib2.0-0 \
                liborc-0.4-0 \
                libgudev-1.0-0 \
                zlib1g \
                libc6 \
                libgcc-s1 \
                libstdc++6

              scripts/gstreamer/package-linux.sh "assets/gstreamer/linux-x86_64"
              scripts/gstreamer/smoke-test-linux.sh "assets/gstreamer/linux-x86_64"

              VERSION="$(assets/gstreamer/linux-x86_64/bin/gst-launch-1.0 --version | awk '"'"'/^gst-launch-1.0 version / { print $3; exit }'"'"')"
              printf "%s\n" "$VERSION" > assets/gstreamer/linux-x86_64/version.txt
              echo "Version: $VERSION"
            '

      - name: Build bundle [linux-aarch64 via Debian forky]
        if: matrix.platform == 'linux-aarch64'
        shell: bash
        run: |
          set -euo pipefail

          chmod +x scripts/gstreamer/package-linux.sh
          chmod +x scripts/gstreamer/smoke-test-linux.sh

          docker run --rm --platform=linux/arm64/v8 \
            -v "${GITHUB_WORKSPACE}:/work" \
            -w /work \
            debian:forky-slim sh -lc '
              set -euo pipefail

              export DEBIAN_FRONTEND=noninteractive

              apt-get update
              apt-get install -y --no-install-recommends \
                bash coreutils findutils file python3 dpkg-dev ca-certificates \
                gstreamer1.0-tools \
                gstreamer1.0-plugins-base \
                gstreamer1.0-plugins-good \
                gstreamer1.0-plugins-bad \
                gstreamer1.0-libav \
                gstreamer1.0-gl \
                gstreamer1.0-x \
                gstreamer1.0-alsa \
                gstreamer1.0-pulseaudio \
                libgstreamer1.0-0 \
                libgstreamer-plugins-base1.0-0 \
                libglib2.0-0 \
                liborc-0.4-0 \
                libgudev-1.0-0 \
                zlib1g \
                libc6 \
                libgcc-s1 \
                libstdc++6

              scripts/gstreamer/package-linux.sh "assets/gstreamer/linux-aarch64"
              scripts/gstreamer/smoke-test-linux.sh "assets/gstreamer/linux-aarch64"

              VERSION="$(assets/gstreamer/linux-aarch64/bin/gst-launch-1.0 --version | awk '"'"'/^gst-launch-1.0 version / { print $3; exit }'"'"')"
              printf "%s\n" "$VERSION" > assets/gstreamer/linux-aarch64/version.txt
              echo "Version: $VERSION"
            '

      - name: Fix file permissions [linux]
        if: startsWith(matrix.platform, 'linux-')
        shell: bash
        run: |
          set -euo pipefail
          sudo chown -R "$USER:$USER" "${{ matrix.asset_path }}" 2>/dev/null || true
          sudo chmod -R a+rX "${{ matrix.asset_path }}" 2>/dev/null || true

      - name: Pack artifact [linux-x86_64]
        if: matrix.platform == 'linux-x86_64'
        shell: bash
        run: |
          set -euo pipefail
          tar -C assets/gstreamer -czf gstreamer-linux-x86_64.tar.gz linux-x86_64

      - name: Upload artifact [linux-x86_64]
        if: matrix.platform == 'linux-x86_64'
        uses: actions/upload-artifact@v6
        with:
          name: gstreamer-linux-x86_64
          path: gstreamer-linux-x86_64.tar.gz
          retention-days: 7

      - name: Pack artifact [linux-aarch64]
        if: matrix.platform == 'linux-aarch64'
        shell: bash
        run: |
          set -euo pipefail
          tar -C assets/gstreamer -czf gstreamer-linux-aarch64.tar.gz linux-aarch64

      - name: Upload artifact [linux-aarch64]
        if: matrix.platform == 'linux-aarch64'
        uses: actions/upload-artifact@v6
        with:
          name: gstreamer-linux-aarch64
          path: gstreamer-linux-aarch64.tar.gz
          retention-days: 7

      - name: Download GStreamer runtime installer [win-x86_64]
        if: matrix.platform == 'win-x86_64'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          curl.exe -L 'https://gstreamer.freedesktop.org/data/pkg/windows/1.28.1/msvc/gstreamer-1.0-msvc-x86_64-1.28.1.exe' -o 'gstreamer-runtime-x86_64.exe'

      - name: Install GStreamer runtime [win-x86_64]
        if: matrix.platform == 'win-x86_64'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $p = Start-Process `
            -FilePath '.\gstreamer-runtime-x86_64.exe' `
            -ArgumentList @('/SP-', '/VERYSILENT', '/SUPPRESSMSGBOXES', '/NORESTART') `
            -PassThru

          if (-not $p.WaitForExit(180000)) {
            try { $p.Kill() } catch {}
            throw 'GStreamer installer timed out after 3 minutes'
          }

          if ($p.ExitCode -ne 0) {
            throw "GStreamer installer failed with exit code $($p.ExitCode)"
          }

      - name: Build bundle [win-x86_64]
        if: matrix.platform == 'win-x86_64'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          ./scripts/gstreamer/package-win.ps1 '${{ matrix.asset_path }}'

      - name: Smoke test bundle [win-x86_64]
        if: matrix.platform == 'win-x86_64'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          ./scripts/gstreamer/smoke-test-win.ps1 '${{ matrix.asset_path }}'

      - name: Write version file [win-x86_64]
        if: matrix.platform == 'win-x86_64'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $versionLine = & "${{ matrix.asset_path }}/bin/gst-launch-1.0.exe" --version |
            Select-String '^gst-launch-1.0 version ' |
            Select-Object -First 1

          if (-not $versionLine) {
            throw 'Could not determine GStreamer version'
          }

          $parts = $versionLine.ToString() -split '\s+'
          if ($parts.Length -lt 3) {
            throw "Unexpected version output: $versionLine"
          }

          $version = $parts[2]
          Set-Content -Path "${{ matrix.asset_path }}/version.txt" -Value $version -NoNewline
          Write-Host "Version: $version"

      - name: Upload artifact [win-x86_64]
        if: matrix.platform == 'win-x86_64'
        uses: actions/upload-artifact@v6
        with:
          name: gstreamer-win-x86_64
          path: assets/gstreamer/win-x86_64
          retention-days: 7

  publish:
    name: Publish gstreamer assets
    needs:
      - plan
      - build
    if: ${{ needs.plan.outputs.is_empty != 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Download artifact [darwin]
        if: contains(needs.plan.outputs.matrix, '"artifact_name":"gstreamer-darwin-arm64"')
        uses: actions/download-artifact@v8
        with:
          name: gstreamer-darwin-arm64
          path: .artifacts/darwin-arm64

      - name: Extract artifact [darwin]
        if: contains(needs.plan.outputs.matrix, '"artifact_name":"gstreamer-darwin-arm64"')
        shell: bash
        run: |
          set -euo pipefail
          rm -rf assets/gstreamer/darwin-arm64
          mkdir -p assets/gstreamer
          tar -C assets/gstreamer -xzf .artifacts/darwin-arm64/gstreamer-darwin-arm64.tar.gz

      - name: Download artifact [linux-x86_64]
        if: contains(needs.plan.outputs.matrix, '"artifact_name":"gstreamer-linux-x86_64"')
        uses: actions/download-artifact@v8
        with:
          name: gstreamer-linux-x86_64
          path: .artifacts/linux-x86_64

      - name: Extract artifact [linux-x86_64]
        if: contains(needs.plan.outputs.matrix, '"artifact_name":"gstreamer-linux-x86_64"')
        shell: bash
        run: |
          set -euo pipefail
          rm -rf assets/gstreamer/linux-x86_64
          mkdir -p assets/gstreamer
          tar -C assets/gstreamer -xzf .artifacts/linux-x86_64/gstreamer-linux-x86_64.tar.gz

      - name: Download artifact [linux-aarch64]
        if: contains(needs.plan.outputs.matrix, '"artifact_name":"gstreamer-linux-aarch64"')
        uses: actions/download-artifact@v8
        with:
          name: gstreamer-linux-aarch64
          path: .artifacts/linux-aarch64

      - name: Extract artifact [linux-aarch64]
        if: contains(needs.plan.outputs.matrix, '"artifact_name":"gstreamer-linux-aarch64"')
        shell: bash
        run: |
          set -euo pipefail
          rm -rf assets/gstreamer/linux-aarch64
          mkdir -p assets/gstreamer
          tar -C assets/gstreamer -xzf .artifacts/linux-aarch64/gstreamer-linux-aarch64.tar.gz

      - name: Prepare target dir [win-x86_64]
        if: contains(needs.plan.outputs.matrix, '"artifact_name":"gstreamer-win-x86_64"')
        shell: bash
        run: |
          set -euo pipefail
          rm -rf assets/gstreamer/win-x86_64
          mkdir -p assets/gstreamer

      - name: Download artifact [win-x86_64]
        if: contains(needs.plan.outputs.matrix, '"artifact_name":"gstreamer-win-x86_64"')
        uses: actions/download-artifact@v8
        with:
          name: gstreamer-win-x86_64
          path: .artifacts/win-x86_64

      - name: Copy artifact into repo [win-x86_64]
        if: contains(needs.plan.outputs.matrix, '"artifact_name":"gstreamer-win-x86_64"')
        shell: bash
        run: |
          set -euo pipefail
          cp -a .artifacts/win-x86_64 assets/gstreamer/win-x86_64

      - name: Read published version
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          VERSION=""
          if [[ -f assets/gstreamer/darwin-arm64/version.txt ]]; then
            VERSION="$(cat assets/gstreamer/darwin-arm64/version.txt)"
          elif [[ -f assets/gstreamer/linux-x86_64/version.txt ]]; then
            VERSION="$(cat assets/gstreamer/linux-x86_64/version.txt)"
          elif [[ -f assets/gstreamer/linux-aarch64/version.txt ]]; then
            VERSION="$(cat assets/gstreamer/linux-aarch64/version.txt)"
          elif [[ -f assets/gstreamer/win-x86_64/version.txt ]]; then
            VERSION="$(cat assets/gstreamer/win-x86_64/version.txt)"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit and push assets
        id: commit_assets
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -f -A assets/gstreamer

          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No asset changes to commit"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -n "${{ steps.meta.outputs.version }}" ]]; then
            git commit -m "chore(gstreamer): update bundled assets to ${{ steps.meta.outputs.version }}"
          else
            git commit -m "chore(gstreamer): update bundled assets"
          fi

          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"
      - name: Push gstreamer badge
        if: steps.commit_assets.outputs.changed == 'true' && steps.meta.outputs.version != '' && (github.ref_name == 'main' || github.ref_name == 'dev')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          BRANCH_NAME: ${{ github.ref_name }}
          GSTREAMER_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail

          BADGE_DIR="$(mktemp -d)"
          cd "$BADGE_DIR"

          git clone --depth=1 --branch version "https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}" .

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          mkdir -p .github/badges
          echo "{\"schemaVersion\":1,\"label\":\"gstreamer\",\"message\":\"${GSTREAMER_VERSION}\",\"color\":\"blue\"}" > ".github/badges/${BRANCH_NAME}-gstreamer.json"

          git add ".github/badges/${BRANCH_NAME}-gstreamer.json"

          if [[ -z "$(git status --porcelain -- ".github/badges/${BRANCH_NAME}-gstreamer.json")" ]]; then
            echo "No badge changes"
            exit 0
          fi

          git commit -m "chore(badges): ${BRANCH_NAME} -> gstreamer ${GSTREAMER_VERSION}"
          git push
