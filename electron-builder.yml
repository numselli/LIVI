appId: dev.f-io.livi
productName: LIVI

directories:
  buildResources: assets

files:
  - out/**
  - package.json
  - node_modules/**
  - '!**/.cache/**'
  - '!**/.pnpm-store/**'
  - '!**/node_modules/.vite/**'
  - '!**/node_modules/.cache/**'
  - '!**/.vscode/**'
  - '!**/*.map'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml,CHANGELOG.md,README.md}'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!src/**'

asarUnpack:
  - resources/**
  - node_modules/usb/**

linux:
  target:
    - AppImage
  icon: icons/linux/livi.png
  maintainer: 'Lasse Heitgres <hello@f-io.dev>'
  category: Utility
  extraResources:
    - from: assets/gstreamer/linux-x86_64
      to: gstreamer/linux-x86_64
      filter:
        - '**/*'
        - '!**/*.a'
        - '!share/**'
    - from: assets/gstreamer/linux-aarch64
      to: gstreamer/linux-aarch64
      filter:
        - '**/*'
        - '!**/*.a'
        - '!share/**'

mac:
  identity: '-'
  notarize: false
  hardenedRuntime: true
  entitlements: assets/mac/entitlements.mac.plist
  entitlementsInherit: assets/mac/entitlements.mac.inherit.plist
  icon: icons/mac/livi.icns
  category: public.app-category.utilities
  extendInfo:
    NSCameraUsageDescription: LIVI requires camera access for CarPlay.
    NSMicrophoneUsageDescription: LIVI requires microphone access for voice control.
    NSDocumentsFolderUsageDescription: LIVI requires access to documents.
    NSDownloadsFolderUsageDescription: LIVI requires access to downloads.
  extraResources:
    - from: assets/gstreamer/darwin-arm64
      to: gstreamer/darwin-arm64
      filter:
        - '**/*'
        - '!**/*.a'
        - '!share/**'

dmg:
  artifactName: ${name}-${version}-${arch}.${ext}

appImage:
  artifactName: ${name}-${version}-${arch}.${ext}

npmRebuild: false

copyright: 'Copyright © 2026 Lasse Heitgres'
publish: null

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: icons/win/livi.ico
  executableName: LIVI
  artifactName: ${name}-${version}-win-${arch}-setup.${ext}
  extraResources:
    - from: assets/gstreamer/win-x86_64
      to: gstreamer/win-x86_64
      filter:
        - '**/*'
        - '!**/*.a'
        - '!share/**'

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

toolsets:
  appimage: '1.0.2'
